<!DOCTYPE html>
<html>
<head>
<title>Car Racing Game</title>
<style>
body{
  margin:0;
  background:#222;
}
#game{
  width:300px;
  height:500px;
  background:#555;
  margin:auto;
  position:relative;
  overflow:hidden;
}
#player{
  width:50px;
  height:80px;
  background:red;
  position:absolute;
  bottom:20px;
  left:125px;
}
.enemy{
  width:50px;
  height:80px;
  background:yellow;
  position:absolute;
  top:-100px;
}
</style>
</head>

<body>

<h2 style="color:white;text-align:center;">Car Racing Game</h2>

<div id="game">
  <div id="player"></div>
</div>

<script>
let player = document.getElementById("player");
let game = document.getElementById("game");
let playerX = 125;

document.addEventListener("keydown", function(e){

  if(e.key === "ArrowLeft"){
    playerX -= 20;
  }

  if(e.key === "ArrowRight"){
    playerX += 20;
  }

  if(playerX < 0) playerX = 0;
  if(playerX > 250) playerX = 250;

  player.style.left = playerX + "px";
});

function createEnemy(){
  let enemy = document.createElement("div");
  enemy.classList.add("enemy");
  enemy.style.left = Math.floor(Math.random()*250) + "px";
  game.appendChild(enemy);

  let enemyY = -100;

  let move = setInterval(function(){
    enemyY += 5;
    enemy.style.top = enemyY + "px";

    if(enemyY > 500){
      enemy.remove();
      clearInterval(move);
    }
  },30);
}

setInterval(createEnemy,2000);
</script>

</body>
</html>
