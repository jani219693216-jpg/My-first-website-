<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Game Pass</title>

    body {

      background: #111;

    }
    .card {

      margin: 20px;

      display: inline-block;
    }
    button {

      background: green;

    }
  </style>
</head>
<body>  <h1>🎮 My Game Pass</h1>  <div class="card">
    <h2>GTA V</h2>
    <p>Play now</p>

  </div>  <div class="card">
    <h2>FIFA 23</h2>
    <p>Play now</p>
    <button onclick="playGame('FIFA 23')">Play</button>
  </div>  <div class="card">
    <h2>Call of Duty</h2>
    <p>Play now</p>
    <button onclick="playGame('Call of Duty')">Play</button>
  </div>  <script>
    function playGame(game) {
      alert('Launching ' + game + '... (Demo Only)');
    }
  </script></body>
</html>
