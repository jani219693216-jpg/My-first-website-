<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Game Pass</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  margin-top: 100px;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px 20px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
}

.games {
  display: none;
  margin-top: 50px;
}

.card {
  display: inline-block;
  background: #1e293b;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container" id="login">
  <h2>Login</h2>
  <input type="text" id="user" placeholder="Username"><br>
  <input type="password" id="pass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div class="games" id="games">
  <h1>🎮 My Game Pass</h1>

  <div class="card">
    <h3>GTA V</h3>
    <a href="https://www.xbox.com/play">
      <button>Play</button>
    </a>
  </div>

  <div class="card">
    <h3>FIFA 23</h3>
    <a href="https://www.xbox.com/play">
      <button>Play</button>
    </a>
  </div>

  <div class="card">
    <h3>Call of Duty</h3>
    <a href="https://www.xbox.com/play">
      <button>Play</button>
    </a>
  </div>

</div>

<script>
function login() {
  var user = document.getElementById("user").value;
  var pass = document.getElementById("pass").value;

  if(user !== "" && pass !== "") {
    document.getElementById("login").style.display = "none";
    document.getElementById("games").style.display = "block";
  } else {
    alert("Please enter username and password");
  }
}
</script>

</body>
</html>
